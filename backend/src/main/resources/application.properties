# =============================================
#  Smart Resume Filtering System – Backend Config
# =============================================

server.port=8081

# ── MySQL Database (FIXED) ────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/smart_resume?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ── File Upload ───────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# ── Logging ───────────────────────────────────
logging.level.com.smartresume=DEBUG
logging.level.org.springframework.web=INFO