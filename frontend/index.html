<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart ATS — Resume Filtering System</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css"/>

</head>

<body class="bg-gray-950 min-h-screen text-white font-sans">

<!-- HEADER -->
<header class="border-b border-gray-800 px-8 py-4 flex items-center justify-between sticky top-0 bg-gray-950">
  <h1 class="text-xl font-bold">SmartATS</h1>
</header>

<!-- HERO -->
<section id="heroSection" class="text-center mt-10">
  <h1 class="text-3xl font-bold">Smart Resume Filtering System</h1>
  <p class="text-gray-400 mt-2">Upload resumes and analyse</p>
</section>

<!-- FORM -->
<section id="uploadSection" class="max-w-3xl mx-auto mt-10">

  <!-- Job Title -->
  <select id="jobTitleSelect" class="w-full p-3 bg-gray-800 border border-gray-600 rounded mb-4">
    <option value="">-- Select or leave blank --</option>
  </select>

  <!-- File -->
  <input type="file" id="fileInput" class="mb-4"/>

  <!-- Description -->
  <textarea id="jobDescInput" class="w-full p-3 bg-gray-800 border border-gray-600 rounded mb-4"
    placeholder="Job description..."></textarea>

  <!-- Button -->
  <button id="submitBtn" class="w-full bg-blue-600 p-3 rounded">
    Analyse Resumes
  </button>

</section>

<!-- RESULTS -->
<section id="resultsHeader" class="hidden text-center mt-10">
  <h2 class="text-2xl font-bold">
    Results <span id="resultJobTitle"></span>
  </h2>
  <p id="resultSubtitle" class="text-gray-400"></p>
</section>

<div id="resumeCards" class="max-w-3xl mx-auto mt-6"></div>

<!-- ✅ ONLY THESE 2 SCRIPTS -->
<script src="assets/js/config.js"></script>
<script src="assets/js/upload.js"></script>

</body>
</html>
